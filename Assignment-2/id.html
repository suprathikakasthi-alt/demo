<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>college id-card</title>
    <link rel="stylesheet" href="id.css">
</head>
<body>
    <div class="container">
        <div class="id-card">
            <header class="card-header">
                <img src="clg1.jpg" alt="clg-logo" height="100px">
                <p>BJR (Autonomous)</p>
                </header>
                <div class="photo-wrap">
                    <img  class="photo"src="clg-pic.jpg" alt="student-pic" height="100px">
                </div>
                <main class="card-body">
                    <div class="name-section">
                        <h2 class="student-name">K Suprathika</h2>
                        <p class="college">Babu Jagjivan Ram Govt Degree College (Autonomous)</p>
                    </div>
                    <hr class="divider">
                    <div class="details">
                        <p><strong>Course:</strong>BCOM(Computer Applications)</p>
                        <p><strong>Birthdate:</strong>23-03-2006</p>
                    </div>
                    <div class="id-line">
                        <span class="id-label">ID No:-</span>
                        <span class="id-value">107024405330</span>
                    </div>
                    <div class="barcode">
                    </div>
                </main>
                <footer class="card-footer">
                    <p class="footer-text">Issued by: BJRGDC(Autonomous)</p>
                </footer>
            </div>
    </div>
</body>
</html>
